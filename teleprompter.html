<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>提词器 · Teleprompter Studio</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0a0a;--sur:#0d0d12;--text:#e8e6dd;--accent:#d4a853;
    --accent-dim:rgba(212,168,83,0.4);--panel-bg:rgba(20,20,24,0.94);
    --fs:48px;--lh:1.55;--ff:system-ui,-apple-system,'PingFang SC',sans-serif;
  }

  /* ═══ Landing page ═══ */
  #landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;background:var(--sur);padding:24px 16px}
  #landing .wrap{width:min(680px,100%);display:flex;flex-direction:column;gap:18px}
  #landing h1{font-size:22px;font-weight:700;color:var(--accent);text-align:center}
  #landing .sub{text-align:center;font-size:12px;color:#666;margin-top:-10px}

  .modes{display:flex;gap:12px;flex-wrap:wrap}
  .mode{flex:1;min-width:140px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:#ccc;border-radius:14px;padding:20px 16px;cursor:pointer;transition:all .2s;text-decoration:none;text-align:center}
  .mode:hover{background:rgba(255,255,255,.08);transform:translateY(-1px)}
  .mode .ico{font-size:30px;display:block;margin-bottom:6px}
  .mode .t{font-size:15px;font-weight:600;margin-bottom:3px}
  .mode .d{font-size:10px;color:#555;line-height:1.4}
  .mode.pri{border-color:rgba(212,168,83,.4);background:rgba(212,168,83,.08)}
  .mode.pri .t{color:var(--accent)}

  textarea{width:100%;background:#14141a;border:1px solid rgba(255,255,255,.1);color:var(--text);border-radius:12px;padding:16px;font-size:14px;font-family:'SF Mono','Fira Code','Consolas','PingFang SC',monospace;line-height:1.7;resize:vertical;min-height:240px;outline:none;transition:border-color .2s}
  textarea:focus{border-color:rgba(212,168,83,.5)}
  textarea::placeholder{color:#555}

  .btns{display:flex;gap:8px;flex-wrap:wrap}
  .btns button{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#ccc;border-radius:10px;padding:10px 18px;font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap}
  .btns button:hover{background:rgba(255,255,255,.12)}
  .btns button.pri{background:rgba(212,168,83,.15);border-color:var(--accent);color:var(--accent);font-weight:600}
  .btns button.pri:hover{background:rgba(212,168,83,.25)}

  .info{font-size:11px;color:#555}
  .info .v{color:var(--accent);font-variant-numeric:tabular-nums}

  #share-card{display:none;background:#14141a;border:1px solid rgba(212,168,83,.2);border-radius:12px;padding:16px;gap:14px;align-items:center;flex-wrap:wrap}
  #share-card.show{display:flex}
  #qr-img{width:120px;height:120px;border-radius:8px}
  .share-r{flex:1;min-width:180px;display:flex;flex-direction:column;gap:6px}
  .share-r label{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.06em}
  .share-r .url{font-size:10px;color:var(--accent);background:rgba(212,168,83,.08);padding:5px 8px;border-radius:5px;font-family:'SF Mono',monospace;word-break:break-all;max-height:50px;overflow-y:auto;line-height:1.4}
  .share-r .note{font-size:9px;color:#555}

  #drop-zone{border:2px dashed rgba(255,255,255,.08);border-radius:10px;padding:18px;text-align:center;color:#555;font-size:11px;cursor:pointer;transition:border-color .2s}
  #drop-zone:hover,#drop-zone.drag{border-color:rgba(212,168,83,.4);color:#888}

  hr{border:none;border-top:1px solid rgba(255,255,255,.06)}

  /* ═══ Client mode ═══ */
  #client{display:none}
  body.client-mode #landing{display:none}
  body.client-mode{background:var(--bg);overflow:hidden}
  body.client-mode #client{display:block}

  #stage{position:fixed;inset:0;overflow:hidden}
  #stage.mirrored{transform:scaleX(-1)}
  #text-wrap{position:absolute;left:0;right:0;top:0;padding:50vh 0 60vh;transform:translateY(0px);will-change:transform}
  #text-content{width:min(90vw,900px);margin:0 auto;font-size:var(--fs);line-height:var(--lh);text-align:center;color:var(--text);white-space:pre-wrap;word-break:break-word;letter-spacing:.01em;transition:font-size .3s,line-height .3s}
  #text-content p{min-height:calc(var(--fs)*var(--lh))}
  #fade-top,#fade-bottom{position:fixed;left:0;right:0;pointer-events:none;z-index:5}
  #fade-top{top:0;height:20vh;background:linear-gradient(to bottom,var(--bg),transparent)}
  #fade-bottom{bottom:0;height:20vh;background:linear-gradient(to top,var(--bg),transparent)}
  #guide{position:fixed;left:8%;right:8%;top:50%;height:1px;background:linear-gradient(90deg,transparent,var(--accent-dim) 20%,var(--accent-dim) 80%,transparent);pointer-events:none;z-index:4}
  #guide::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;background:var(--accent);border-radius:50%}

  #top-bar{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:50;display:flex;gap:6px;align-items:center;background:var(--panel-bg);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:6px 12px;font-size:11px;color:#999;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:opacity .4s}
  #top-bar button{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#ccc;border-radius:12px;padding:4px 10px;font-size:11px;font-family:inherit;cursor:pointer;white-space:nowrap;touch-action:manipulation}
  #top-bar button:hover{background:rgba(255,255,255,.14)}
  #top-bar button.active,#top-bar button.accent{border-color:var(--accent);color:var(--accent)}

  #bottom-bar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:50;display:flex;gap:10px;align-items:center;background:var(--panel-bg);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:8px 14px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:opacity .4s}
  #bottom-bar button{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#ccc;border-radius:12px;padding:4px 10px;font-size:11px;font-family:inherit;cursor:pointer;white-space:nowrap;touch-action:manipulation}
  #bottom-bar button:hover{background:rgba(255,255,255,.14)}
  #btn-play{font-size:15px;font-weight:600;padding:8px 16px;border-radius:14px;flex-shrink:0}
  #btn-play.active{background:rgba(212,168,83,.2);border-color:var(--accent);color:var(--accent)}
  #btn-reset{font-size:16px;padding:6px 10px;flex-shrink:0}

  /* Momentum speed picker */
  #spd-wrap{position:relative;display:flex;align-items:center;overflow:hidden;width:200px;height:48px}
  #spd-wrap::before,#spd-wrap::after{content:'';position:absolute;top:0;bottom:0;width:70px;z-index:2;pointer-events:none}
  #spd-wrap::before{left:0;background:linear-gradient(to right,var(--panel-bg),transparent)}
  #spd-wrap::after{right:0;background:linear-gradient(to left,var(--panel-bg),transparent)}
  #spd-indicator{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:54px;height:40px;border:2px solid var(--accent);border-radius:10px;pointer-events:none;z-index:1}
  #spd-track{display:flex;align-items:center;gap:0;will-change:transform;cursor:grab;z-index:3}
  #spd-track:active{cursor:grabbing}
  .spd-item{flex-shrink:0;width:56px;text-align:center;font-size:13px;color:#555;font-weight:500;padding:8px 0;cursor:pointer;user-select:none;-webkit-user-select:none;transition:color .15s,font-size .15s}
  .spd-item.active{color:var(--accent);font-size:20px;font-weight:700}

  body.fs-hide-ui #top-bar,body.fs-hide-ui #bottom-bar{opacity:0;pointer-events:none}
  body.fs-hide-ui #fs-hint{opacity:.3}
  #fs-hint{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);z-index:40;font-size:11px;color:rgba(255,255,255,.2);pointer-events:none;transition:opacity .8s}
  .tag{font-size:10px;color:var(--accent);font-variant-numeric:tabular-nums}

  /* Back button in client mode */
  #btn-back{position:fixed;top:12px;left:12px;z-index:51;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#888;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:opacity .4s}
  body.fs-hide-ui #btn-back{opacity:0;pointer-events:none}

  @media(max-width:600px){
    :root{--fs:36px}
    #bottom-bar{padding:6px 10px;gap:6px;border-radius:18px}
    #spd-wrap{width:150px;height:40px}
    .spd-item{width:46px;font-size:11px}
    .spd-item.active{font-size:17px}
    #spd-indicator{width:46px;height:34px}
    #top-bar{font-size:10px;padding:4px 8px}
    .modes{flex-direction:column}
    .mode{padding:14px}
  }
</style>
</head>
<body>

<!-- ═══ LANDING ═══ -->
<div id="landing">
  <div class="wrap">
    <h1>🎬 提词器</h1>
    <p class="sub">零依赖 · 点开即用 · 三种方式任选</p>

    <div class="modes">
      <div class="mode pri" id="mode-edit">
        <span class="ico">✏️</span>
        <span class="t">编辑脚本 → 生成链接</span>
        <span class="d">写完生成二维码<br>平板扫码直接提词</span>
      </div>
      <div class="mode" id="mode-client">
        <span class="ico">📱</span>
        <span class="t">直接打开提词器</span>
        <span class="d">全屏沉浸 · 翻动调速<br>拖动回溯 · 轻触暂停</span>
      </div>
      <div class="mode" id="mode-paste">
        <span class="ico">📋</span>
        <span class="t">粘贴脚本 → 立即开始</span>
        <span class="d">复制好的文案<br>一键粘贴进提词器</span>
      </div>
    </div>

    <hr>

    <div id="edit-area" style="display:none">
      <div id="drop-zone">📂 拖放 .txt / .md 文件，或点击选择</div>
      <textarea id="ed" placeholder="在此输入或粘贴提词脚本…&#10;&#10;支持 **粗体** 和 *斜体*&#10;空行 = 停顿&#10;&#10;写完后点「生成链接」→ 平板扫码 → 直接开读"></textarea>
      <div class="info">字数: <span class="v" id="cnt">--</span></div>
      <div class="btns">
        <button class="pri" id="btn-gen">🔗 生成提词链接</button>
        <button id="btn-go-client">📱 直接在本机提词</button>
        <button id="btn-paste">📋 从剪贴板粘贴</button>
        <button id="btn-clear">🗑 清空</button>
      </div>
      <div id="share-card">
        <img id="qr-img" src="" alt="QR Code">
        <div class="share-r">
          <label>平板扫码或输入此链接</label>
          <div class="url" id="share-url"></div>
          <div class="btns" style="margin-top:2px">
            <button id="btn-copy-url">📋 复制链接</button>
            <button id="btn-test-link">📱 预览</button>
          </div>
          <span class="note">⚠ 脚本较长时链接也较长。也可用本页直接提词（右侧按钮）</span>
        </div>
      </div>
    </div>

    <div style="font-size:10px;color:#444;text-align:center">
      快捷键: Cmd+S 生成链接 &nbsp;|&nbsp; 拖放 / 粘贴 / URL 均可导入
    </div>
  </div>
</div>

<!-- ═══ CLIENT ═══ -->
<div id="client">
  <div id="stage"><div id="text-wrap"><div id="text-content"><p>正在加载…</p></div></div></div>
  <div id="fade-top"></div><div id="fade-bottom"></div><div id="guide"></div>
  <button id="btn-back" title="返回编辑">←</button>

  <div id="top-bar">
    <span class="tag" id="prog-tag">--</span>
    <button id="btn-fs" class="accent">⛶ 全屏</button>
    <button id="btn-mirror">🪞</button>
    <button id="btn-smaller">A-</button>
    <button id="btn-bigger">A+</button>
    <button id="btn-font">字体</button>
    <button id="btn-lh">行距</button>
  </div>

  <div id="bottom-bar">
    <button id="btn-play">▶ 播放</button>
    <div id="spd-wrap"><div id="spd-indicator"></div><div id="spd-track"></div></div>
    <button id="btn-reset" title="回到开头">↩</button>
  </div>

  <div id="fs-hint">轻触暂停 · 拖动回溯 · 翻动选速度</div>
</div>

<input type="file" id="fi" accept=".txt,.md,.html,.htm,.csv,.json" style="display:none">

<script>
(function(){
var $=function(id){return document.getElementById(id)};
var d=document;

// ═══════════════════════════════════════
//  LANDING PAGE LOGIC
// ═══════════════════════════════════════
var ed=$('ed'),cnt=$('cnt'),shareCard=$('share-card'),qrImg=$('qr-img'),shareUrl=$('share-url');
var editArea=$('edit-area'),dropZone=$('drop-zone');
var clientContent='';

// Check if URL has embedded content → auto-enter client mode
var hash=location.hash;
if(hash.indexOf('#c=')===0){
  try{
    var raw=hash.slice(3);
    clientContent=decodeURIComponent(escape(atob(raw.replace(/-/g,'+').replace(/_/g,'/'))));
    enterClient(clientContent);
  }catch(e){}
}

function encodeContent(txt){try{return btoa(unescape(encodeURIComponent(txt))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}catch(e){return''}}

function generateLink(){
  var txt=ed.value.trim();
  if(!txt){alert('请先输入脚本内容');return}
  var enc=encodeContent(txt);
  if(!enc){alert('内容过长，编码失败');return}
  var url=location.origin+location.pathname+'#c='+enc;
  shareUrl.textContent=url;
  qrImg.src='https://api.qrserver.com/v1/create-qr-code/?size=250x250&data='+encodeURIComponent(url);
  shareCard.classList.add('show');
}
function updCnt(){var t=ed.value;cnt.textContent=(t.trim()?t.trim().split(/\s+/).length:0)+' 词 / '+t.replace(/\s/g,'').length+' 字'}

// Mode toggles
$('mode-edit').addEventListener('click',function(){editArea.style.display='';editArea.scrollIntoView({behavior:'smooth'});ed.focus()});
$('mode-client').addEventListener('click',function(){enterClient(ed.value.trim()||defaultScript())});
$('mode-paste').addEventListener('click',function(){navigator.clipboard.readText().then(function(t){if(t&&t.trim()){clientContent=t;enterClient(t)}else{alert('剪贴板为空或无法读取')}}).catch(function(){alert('无法读取剪贴板，请手动粘贴到编辑器后使用「直接在本机提词」')})});

// Button handlers
$('btn-gen').addEventListener('click',generateLink);
$('btn-go-client').addEventListener('click',function(){var t=ed.value.trim();if(!t){alert('请先输入脚本');return}enterClient(t)});
$('btn-paste').addEventListener('click',function(){navigator.clipboard.readText().then(function(t){if(t){ed.value=t;updCnt()}}).catch(function(){alert('无法读取剪贴板')})});
$('btn-clear').addEventListener('click',function(){if(confirm('确定清空？')){ed.value='';updCnt();shareCard.classList.remove('show')}});
$('btn-copy-url').addEventListener('click',function(){navigator.clipboard.writeText(shareUrl.textContent).then(function(){var b=$('btn-copy-url');b.textContent='已复制!';setTimeout(function(){b.textContent='📋 复制链接'},1500)})});
$('btn-test-link').addEventListener('click',function(){enterClient(ed.value.trim()||defaultScript())});

// Drop zone
dropZone.addEventListener('click',function(){$('fi').click()});
dropZone.addEventListener('dragover',function(e){e.preventDefault();dropZone.classList.add('drag')});
dropZone.addEventListener('dragleave',function(){dropZone.classList.remove('drag')});
dropZone.addEventListener('drop',function(e){e.preventDefault();dropZone.classList.remove('drag');var f=e.dataTransfer.files[0];if(f)readFile(f)});
d.addEventListener('dragover',function(e){e.preventDefault();dropZone.classList.add('drag')});
d.addEventListener('drop',function(e){e.preventDefault();dropZone.classList.remove('drag');var f=e.dataTransfer.files[0];if(f)readFile(f)});
function readFile(f){var r=new FileReader();r.onload=function(){ed.value=r.result;updCnt()};r.readAsText(f)}
$('fi').addEventListener('change',function(){if(this.files[0]){readFile(this.files[0]);this.value=''}});

ed.addEventListener('input',function(){updCnt();if(shareCard.classList.contains('show'))shareCard.classList.remove('show')});
d.addEventListener('keydown',function(e){if((e.metaKey||e.ctrlKey)&&e.key==='s'&&d.activeElement===ed){e.preventDefault();generateLink()}});

function defaultScript(){return '欢迎使用提词器\n\n这是一个零依赖、即开即用的 Web 提词器\n\n支持 **粗体** 和 *斜体* 标记\n空行代表停顿\n\n把这段文字替换成你的脚本\n然后点击播放开始提词\n\n快捷键:\nSpace 播放/暂停\nEsc 停止\nF 全屏\nM 镜像\n← → 调整速度\n↑ ↓ 调整字号'}

// ═══════════════════════════════════════
//  CLIENT LOGIC
// ═══════════════════════════════════════
var STEPS=[10,15,20,25,30,35,40,45,50,55,60,65,70,80,90,100];
var FONTS=["system-ui,-apple-system,'PingFang SC',sans-serif","'Noto Serif SC',Georgia,'Songti SC',serif","'SF Mono','Fira Code','Consolas',monospace"];
var LHEIGHTS=[1.35,1.55,1.85,2.2];
var LH_LABELS=['紧凑','标准','宽松','极宽'];
var scrollY=0,totalH=0,speed=40,fsize=48,fidx=0,lidx=1;
var isPlay=false,isMir=false,isFS=false,af=null,lt=0,uiT=null;
var tsY=0,tsSY=0,tsOn=false,tsMv=false;
var currIdx=STEPS.indexOf(speed),trackX=0,vel=0,trk=false,sx=0,spx=0,lx2=0,lt2=0,tid=null;
var md=false,msy=0,mss=0;

var stage=$('stage'),tw=$('text-wrap'),tc=$('text-content');
var btnPlay=$('btn-play'),btnFS=$('btn-fs'),btnMir=$('btn-mirror');
var spdWrap=$('spd-wrap'),spdTrack=$('spd-track'),progTag=$('prog-tag');

function enterClient(txt){
  d.body.classList.add('client-mode');
  renderText(txt);buildPicker();applyVars();calcTH();updProg();
}

function renderText(txt){
  var h=txt.split('\n').map(function(l){var t=l.trim();if(!t)return'<p></p>';t=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');t=t.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\*(.+?)\*/g,'<i>$1</i>');return'<p>'+t+'</p>'}).join('\n');
  tc.innerHTML=h;calcTH();updProg();
}
function calcTH(){totalH=Math.max(0,tc.scrollHeight-window.innerHeight*.3)}
function applyVars(){d.documentElement.style.setProperty('--fs',fsize+'px');d.documentElement.style.setProperty('--lh',LHEIGHTS[lidx]);d.documentElement.style.setProperty('--ff',FONTS[fidx])}

function startA(){if(af)return;if(scrollY>=totalH){scrollY=0;updPos()}isPlay=true;lt=performance.now();btnPlay.textContent='⏸ 暂停';btnPlay.classList.add('active');loop()}
function pauseA(){isPlay=false;if(af){cancelAnimationFrame(af);af=null}btnPlay.textContent='▶ 播放';btnPlay.classList.remove('active')}
function stopA(){pauseA();scrollY=0;updPos();updProg()}
function loop(ts){if(!ts)ts=performance.now();var dt=Math.min((ts-lt)/1000,.1);lt=ts;scrollY+=speed*2.2*dt;if(Math.floor(ts/500)!==Math.floor((ts-dt*1000)/500))calcTH();if(scrollY>=totalH){pauseA();scrollY=totalH;updPos();updProg();return}updPos();updProg();af=requestAnimationFrame(loop)}
function updPos(){tw.style.transform='translateY('+(scrollY*-1)+'px)'}
function updProg(){progTag.textContent=totalH<=0?'--':Math.min(100,Math.round(scrollY/totalH*100))+'%'}

// Speed picker
function buildPicker(){
  spdTrack.innerHTML='';
  STEPS.forEach(function(v,i){var d=document.createElement('div');d.className='spd-item';d.textContent=v;d.dataset.idx=i;spdTrack.appendChild(d)});
  var hw=spdWrap.offsetWidth/2;trackX=hw-28-currIdx*56;updateTrack(false);
}
function updateTrack(anim){
  spdTrack.style.transition=anim?'transform .25s cubic-bezier(.25,.8,.25,1.3)':'none';
  spdTrack.style.transform='translateX('+trackX+'px)';
  var cx=-trackX+spdWrap.offsetWidth/2,ni=Math.round((cx-28)/56);ni=Math.max(0,Math.min(STEPS.length-1,ni));
  if(ni!==currIdx){currIdx=ni;speed=STEPS[ni];spdTrack.querySelectorAll('.spd-item').forEach(function(el,i){el.classList.toggle('active',i===currIdx)})}
}
function snapTo(idx){currIdx=Math.max(0,Math.min(STEPS.length-1,idx));speed=STEPS[currIdx];var hw=spdWrap.offsetWidth/2;trackX=hw-28-currIdx*56;vel=0;updateTrack(true);spdTrack.querySelectorAll('.spd-item').forEach(function(el,i){el.classList.toggle('active',i===currIdx)})}
function clampX(){var hw=spdWrap.offsetWidth/2,mx=hw-28,mn=-(STEPS.length*56-hw+28);if(trackX>mx+40)trackX=mx+40;else if(trackX<mn-40)trackX=mn-40}
function startMomentum(){var tv=vel,fric=.945,mv=.15;function anim(){if(trk)return;trackX+=tv;tv*=fric;var hw=spdWrap.offsetWidth/2,mx=hw-28,mn=-(STEPS.length*56-hw+28);if(trackX>mx){trackX=mx;tv*=-.3}else if(trackX<mn){trackX=mn;tv*=-.3}updateTrack(false);if(Math.abs(tv)<mv){snapTo(currIdx);return}tid=requestAnimationFrame(anim)}tid=requestAnimationFrame(anim)}
function cancelTween(){if(tid){cancelAnimationFrame(tid);tid=null}}
var snapTmr=null;
function debounceSnap(){clearTimeout(snapTmr);snapTmr=setTimeout(function(){snapTo(currIdx)},150)}

spdTrack.addEventListener('touchstart',function(e){e.preventDefault();trk=true;vel=0;tsMv=false;sx=e.touches[0].clientX;spx=trackX;lx2=sx;lt2=Date.now();cancelTween();updateTrack(false)},{passive:false});
spdTrack.addEventListener('touchmove',function(e){if(!trk)return;e.preventDefault();var x=e.touches[0].clientX,dx=x-sx;if(Math.abs(dx)>3)tsMv=true;var now=Date.now(),dt=now-lt2;if(dt>0)vel=(x-lx2)/dt*16.67;lx2=x;lt2=now;trackX=spx+dx;clampX();updateTrack(false)},{passive:false});
spdTrack.addEventListener('touchend',function(){if(!trk)return;trk=false;if(!tsMv){snapTo(currIdx);return}startMomentum()});
spdTrack.addEventListener('mousedown',function(e){e.preventDefault();trk=true;vel=0;tsMv=false;sx=e.clientX;spx=trackX;lx2=sx;lt2=Date.now();cancelTween();updateTrack(false)});
window.addEventListener('mousemove',function(e){if(!trk)return;var dx=e.clientX-sx;if(Math.abs(dx)>3)tsMv=true;var now=Date.now(),dt=now-lt2;if(dt>0)vel=(e.clientX-lx2)/dt*16.67;lx2=e.clientX;lt2=now;trackX=spx+dx;clampX();updateTrack(false)});
window.addEventListener('mouseup',function(){if(!trk)return;trk=false;if(!tsMv){snapTo(currIdx);return}startMomentum()});
spdWrap.addEventListener('wheel',function(e){e.preventDefault();cancelTween();trackX-=e.deltaY*.5;clampX();updateTrack(false);debounceSnap()},{passive:false});
spdTrack.addEventListener('click',function(e){if(tsMv)return;var el=e.target.closest('.spd-item');if(!el)return;snapTo(parseInt(el.dataset.idx))});

// Touch interaction
stage.addEventListener('touchstart',function(e){if(e.target.closest('button')||e.target.closest('#bottom-bar')||e.target.closest('#top-bar')||e.target.closest('#spd-wrap')||e.target.closest('#btn-back'))return;e.preventDefault();tsOn=true;tsMv=false;tsY=e.touches[0].clientY;tsSY=scrollY;pauseA();showUI()},{passive:false});
stage.addEventListener('touchmove',function(e){if(!tsOn)return;e.preventDefault();var dy=tsY-e.touches[0].clientY;if(Math.abs(dy)>3)tsMv=true;scrollY=Math.max(0,Math.min(totalH,tsSY+dy));updPos();updProg()},{passive:false});
stage.addEventListener('touchend',function(){if(!tsOn)return;tsOn=false;if(!tsMv){if(isPlay)pauseA();else startA()}hideAfter()});
stage.addEventListener('mousedown',function(e){if(e.target.closest('button')||e.target.closest('#bottom-bar')||e.target.closest('#top-bar')||e.target.closest('#spd-wrap')||e.target.closest('#btn-back'))return;md=true;msy=e.clientY;mss=scrollY;pauseA();showUI()});
window.addEventListener('mousemove',function(e){if(!md)return;scrollY=Math.max(0,Math.min(totalH,mss+(msy-e.clientY)));updPos();updProg();showUI()});
window.addEventListener('mouseup',function(){if(!md)return;var mvd=Math.abs(scrollY-mss)>2;md=false;if(!mvd){if(isPlay)pauseA();else startA()}hideAfter()});

// UI
function showUI(){d.body.classList.remove('fs-hide-ui');clearTimeout(uiT)}
function hideAfter(){clearTimeout(uiT);if(isFS)uiT=setTimeout(function(){if(!tsOn&&!md)d.body.classList.add('fs-hide-ui')},3000)}
function enterFS(){var el=d.documentElement;if(el.requestFullscreen)el.requestFullscreen();else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen()}
function exitFS(){if(d.fullscreenElement)d.exitFullscreen();else if(d.webkitFullscreenElement)d.webkitExitFullscreen()}
function onFSC(){isFS=!!(d.fullscreenElement||d.webkitFullscreenElement);btnFS.textContent=isFS?'⛶ 退出':'⛶ 全屏';btnFS.classList.toggle('active',isFS);$('fs-hint').style.display=isFS?'':'none';$('btn-back').style.display=isFS?'none':'';if(isFS)hideAfter();else{showUI();d.body.classList.remove('fs-hide-ui')}}
d.addEventListener('fullscreenchange',onFSC);d.addEventListener('webkitfullscreenchange',onFSC);

// Buttons
btnFS.addEventListener('click',function(){isFS?exitFS():enterFS()});
btnPlay.addEventListener('click',function(){(isPlay?pauseA:startA)()});
btnMir.addEventListener('click',function(){isMir=!isMir;stage.classList.toggle('mirrored',isMir);btnMir.classList.toggle('active',isMir)});
$('btn-bigger').addEventListener('click',function(){fsize=Math.min(96,fsize+6);applyVars();calcTH()});
$('btn-smaller').addEventListener('click',function(){fsize=Math.max(20,fsize-6);applyVars();calcTH()});
$('btn-reset').addEventListener('click',function(){pauseA();scrollY=0;updPos();updProg();showUI()});
$('btn-font').addEventListener('click',function(){fidx=(fidx+1)%FONTS.length;applyVars();showToast('字体: '+(fidx===0?'无衬线':fidx===1?'衬线':'等宽'))});
$('btn-lh').addEventListener('click',function(){lidx=(lidx+1)%LHEIGHTS.length;applyVars();calcTH();showToast('行距: '+LH_LABELS[lidx])});
$('btn-back').addEventListener('click',function(){pauseA();d.body.classList.remove('client-mode');history.replaceState(null,'',location.pathname)});

function showToast(m){var t=d.createElement('div');t.style.cssText='position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--bg);padding:6px 18px;border-radius:16px;font-size:13px;font-weight:600;z-index:400;animation:tIn .25s ease,tOut .25s ease 1.5s forwards';t.textContent=m;d.body.appendChild(t);setTimeout(function(){t.remove()},2000)}
if(!d.getElementById('toast-style')){var ts=d.createElement('style');ts.id='toast-style';ts.textContent='@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}}@keyframes tOut{to{opacity:0;transform:translateX(-50%) translateY(-8px)}}';d.head.appendChild(ts)}

// Keyboard
d.addEventListener('keydown',function(e){if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;switch(e.key){case' ':e.preventDefault();(isPlay?pauseA:startA)();break;case'Escape':e.preventDefault();stopA();showUI();break;case'ArrowLeft':e.preventDefault();snapTo(currIdx-1);break;case'ArrowRight':e.preventDefault();snapTo(currIdx+1);break;case'ArrowUp':fsize=Math.min(96,fsize+4);applyVars();calcTH();break;case'ArrowDown':fsize=Math.max(20,fsize-4);applyVars();calcTH();break;case'f':case'F':(isFS?exitFS:enterFS)();break;case'm':case'M':btnMir.click();break}});

window.addEventListener('resize',function(){calcTH();if(scrollY>totalH){scrollY=totalH;updPos()};if(d.body.classList.contains('client-mode'))buildPicker()});
d.addEventListener('mousemove',function(){if(isFS)showUI();hideAfter()});
d.addEventListener('touchstart',function(e){if(isFS&&!e.target.closest('#spd-wrap')&&!e.target.closest('#btn-back')){showUI();hideAfter()}},{passive:true});

// Init
updCnt();

// Auto-show editor if not in client mode (friendly landing)
if(!d.body.classList.contains('client-mode')){
  setTimeout(function(){
    if(!hash||hash.indexOf('#c=')!==0) editArea.style.display='';
  },200);
}

console.log('🎬 提词器 v1.3 | 编辑→生成链接→扫码→提词');
})();
</script>
